<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matu editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="hierarchy" class="sidebar panel">
        <h1>Hierarchy</h1>
    </div>

    <div id="center">

        <div id="toolbar" class="panel"></div>

        <div id="viewport" class="panel">
            <canvas id="matu-canvas"></canvas>
        </div>

        <div id="assets" class="panel">
            <h1>Assets</h1>
            <button id="add-assets">+</button>
            <input type="file" id="asset-input" multiple>
            <div id="asset-list"></div>
        </div>

    </div>

    <div id="inspector" class="sidebar panel">
        <h1>Inspector</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
